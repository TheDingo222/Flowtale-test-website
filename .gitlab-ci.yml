stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# Run tests on merge requests and main branch
test:
  stage: test
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
  script:
    - npm ci
    - npm test -- --passWithNoTests
  only:
    - merge_requests
    - main

# Build Docker image and push to GitLab registry
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main

# Deploy to Azure App Service
deploy:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  script:
    - az login --service-principal
        -u $AZURE_CLIENT_ID
        -p $AZURE_CLIENT_SECRET
        --tenant $AZURE_TENANT_ID
    - az webapp config container set
        --name $AZURE_APP_NAME
        --resource-group $AZURE_RESOURCE_GROUP
        --docker-custom-image-name $DOCKER_IMAGE
        --docker-registry-server-url $CI_REGISTRY
        --docker-registry-server-user $CI_REGISTRY_USER
        --docker-registry-server-password $CI_REGISTRY_PASSWORD
    - az webapp restart
        --name $AZURE_APP_NAME
        --resource-group $AZURE_RESOURCE_GROUP
  only:
    - main
  environment:
    name: production
  needs:
    - build
